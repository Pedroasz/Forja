name: Supabase baseline capture

on:
  workflow_dispatch:
    inputs:
      confirm_project_ref:
        description: "Type the production Supabase project ref to confirm the target"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: supabase-baseline-capture
  cancel-in-progress: false

jobs:
  capture:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - name: Validate target and required configuration
        shell: bash
        env:
          CONFIRM_PROJECT_REF: ${{ inputs.confirm_project_ref }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          expected_ref="yncintjylzmvzcadjfqa"

          test "$GITHUB_REF" = "refs/heads/main" || {
            echo "Baseline capture must be dispatched from main."
            exit 1
          }
          test "$CONFIRM_PROJECT_REF" = "$expected_ref" || {
            echo "Project ref confirmation does not match the FORJA production project."
            exit 1
          }
          test -n "$SUPABASE_ACCESS_TOKEN" || {
            echo "Missing SUPABASE_ACCESS_TOKEN secret."
            exit 1
          }
          test -n "$SUPABASE_DB_PASSWORD" || {
            echo "Missing SUPABASE_DB_PASSWORD secret."
            exit 1
          }
          test "$SUPABASE_PROJECT_REF" = "$expected_ref" || {
            echo "SUPABASE_PROJECT_REF is missing or points to a different project."
            exit 1
          }

      - name: Check out main with full history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install pinned dependencies
        run: pnpm install --frozen-lockfile

      - name: Confirm pinned CLI syntax
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec supabase --version
          pnpm exec supabase --help >/dev/null
          pnpm exec supabase link --help >/dev/null
          pnpm exec supabase migration list --help >/dev/null
          pnpm exec supabase migration fetch --help >/dev/null
          pnpm exec supabase db dump --help >/dev/null
          pnpm exec supabase db push --help >/dev/null
          pnpm exec supabase start --help >/dev/null
          pnpm exec supabase stop --help >/dev/null
          pnpm exec supabase db lint --help >/dev/null
          pnpm exec supabase db advisors --help >/dev/null
          pnpm exec supabase gen types --help >/dev/null

      - name: Require Docker before remote access
        run: docker info

      - name: Create the one-time baseline branch
        id: branch
        shell: bash
        run: |
          set -euo pipefail
          branch="agent/supabase-remote-baseline-resume-${GITHUB_RUN_ID}"

          set +e
          git ls-remote --exit-code --heads origin "refs/heads/$branch" >/dev/null 2>&1
          remote_status=$?
          set -e

          case "$remote_status" in
            0)
              echo "Remote branch already exists: $branch"
              exit 1
              ;;
            2)
              ;;
            *)
              echo "Could not safely verify whether the remote branch exists."
              exit 1
              ;;
          esac

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          echo "name=$branch" >> "$GITHUB_OUTPUT"

      - name: Create structured migration-history validator
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/check-migration-history.mjs" <<'NODE'
          import { readFileSync } from 'node:fs';

          const [file, mode, expectedVersion = '', expectedName = ''] = process.argv.slice(2);
          const raw = readFileSync(file, 'utf8').trim();
          let document;

          try {
            document = JSON.parse(raw);
          } catch {
            throw new Error('Supabase migration list did not return valid structured JSON.');
          }

          const versionPattern = /^\d{14}$/;
          if (!Array.isArray(document?.migrations)) {
            throw new Error('Supabase migration list JSON does not contain a migrations array.');
          }
          if (!versionPattern.test(expectedVersion) || expectedName !== 'forja_remote_baseline') {
            throw new Error('Invalid migration-history validation request.');
          }

          const migrations = document.migrations;
          if (migrations.length !== 1) {
            throw new Error('Expected exactly one migration in the remote baseline history.');
          }

          const migration = migrations[0];
          const value = (key) => {
            const candidate = migration?.[key];
            return candidate === null || candidate === undefined ? '' : String(candidate).trim();
          };
          const remote = value('remote') || value('version');
          const local = value('local');
          const name = value('name') || value('remote_name');

          if (remote !== expectedVersion) {
            throw new Error('The registered remote migration version is not the expected baseline.');
          }
          if (name && name !== expectedName) {
            throw new Error('The registered remote migration name is not forja_remote_baseline.');
          }

          if (mode === 'registered') {
            if (local) {
              throw new Error('The recovery checkout must not contain a local migration before migration fetch.');
            }
            console.log(`Confirmed the single registered remote baseline at ${expectedVersion}.`);
            process.exit(0);
          }

          if (mode !== 'aligned' || local !== expectedVersion || remote !== expectedVersion) {
            throw new Error('Local and remote migration histories are not exactly aligned at the expected baseline.');
          }

          console.log(`Local and remote migration histories are aligned at ${expectedVersion}.`);
          NODE

      - name: Test structured migration-history validator
        shell: bash
        run: |
          set -euo pipefail
          fixture_dir="$RUNNER_TEMP/migration-history-validator-fixtures"
          mkdir -p "$fixture_dir"
          cat > "$fixture_dir/registered.json" <<'JSON'
          {"migrations":[{"local":"","remote":"20260715144255"}]}
          JSON
          cat > "$fixture_dir/aligned.json" <<'JSON'
          {"migrations":[{"local":"20260715144255","remote":"20260715144255"}]}
          JSON
          node "$RUNNER_TEMP/check-migration-history.mjs" \
            "$fixture_dir/registered.json" registered 20260715144255 forja_remote_baseline
          node "$RUNNER_TEMP/check-migration-history.mjs" \
            "$fixture_dir/aligned.json" aligned 20260715144255 forja_remote_baseline
          if node "$RUNNER_TEMP/check-migration-history.mjs" \
            "$fixture_dir/aligned.json" aligned 20260715144255; then
            echo "Validator accepted a missing expected migration name."
            exit 1
          fi

      - name: Link the confirmed production project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: pnpm exec supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Confirm the registered remote baseline
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          pnpm exec supabase --output-format json migration list --linked \
            | tee artifacts/migration-list-before.json
          node "$RUNNER_TEMP/check-migration-history.mjs" \
            artifacts/migration-list-before.json registered 20260715144255 forja_remote_baseline

      - name: Confirm migration fetch syntax
        run: pnpm exec supabase migration fetch --help

      - name: Recover the registered baseline migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: pnpm exec supabase migration fetch --linked --yes

      - name: Validate the generated baseline migration
        id: migration
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t migrations < <(find supabase/migrations -maxdepth 1 -type f -name '*.sql' -printf '%f\n' | sort)
          test "${#migrations[@]}" -eq 1 || {
            echo "Expected exactly one generated migration; found ${#migrations[@]}."
            exit 1
          }

          expected_version="20260715144255"
          expected_name="${expected_version}_forja_remote_baseline.sql"
          migration_name="${migrations[0]}"
          test "$migration_name" = "$expected_name" || {
            echo "The recovered migration does not match the registered baseline name."
            exit 1
          }
          migration_version="$expected_version"
          migration_path="supabase/migrations/$migration_name"

          test -s "$migration_path" || {
            echo "The generated baseline migration is empty."
            exit 1
          }
          if grep -Eiq 'DROP[[:space:]]+DATABASE([[:space:]]|;)' "$migration_path"; then
            echo "Unsafe DROP DATABASE found in the generated baseline."
            exit 1
          fi
          if grep -Eiq 'DROP[[:space:]]+SCHEMA[[:space:]]+(IF[[:space:]]+EXISTS[[:space:]]+)?("?public"?)([[:space:]]|;)' "$migration_path"; then
            echo "Unsafe DROP SCHEMA public found in the generated baseline."
            exit 1
          fi
          if grep -Eiq '(^|;)[[:space:]]*TRUNCATE([[:space:]]|;)' "$migration_path"; then
            echo "Unsafe TRUNCATE found in the generated baseline."
            exit 1
          fi
          if grep -Eiq '(DELETE[[:space:]]+FROM|INSERT[[:space:]]+INTO)[[:space:]]+("?auth"?\.)?"?users"?' "$migration_path"; then
            echo "Unsafe auth.users data operation found in the generated baseline."
            exit 1
          fi
          if grep -Eiq '^[[:space:]]*COPY[[:space:]].*FROM[[:space:]]+stdin' "$migration_path"; then
            echo "Copied table records found in the generated baseline."
            exit 1
          fi
          reject_sensitive_content() {
            local pattern="$1"
            local category="$2"
            if grep -Eiq "$pattern" "$migration_path"; then
              echo "Secret scan failed: $category detected."
              exit 1
            fi
          }

          reject_sensitive_content 'sb_secret_[A-Za-z0-9_-]+' 'Supabase secret key'
          reject_sensitive_content 'sbp_[A-Za-z0-9_-]+' 'Supabase personal token'
          reject_sensitive_content 'gh[pousr]_[A-Za-z0-9_]+' 'GitHub personal token'
          reject_sensitive_content 'SUPABASE_(ACCESS_TOKEN|DB_PASSWORD)' 'Supabase credential environment variable'
          reject_sensitive_content 'postgres(ql)?://[^[:space:]]+:[^@[:space:]]+@' 'database connection string with password'
          reject_sensitive_content 'eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}' 'JWT'

          pnpm run supabase:validate:migrations
          echo "name=$migration_name" >> "$GITHUB_OUTPUT"
          echo "version=$migration_version" >> "$GITHUB_OUTPUT"
          echo "path=$migration_path" >> "$GITHUB_OUTPUT"

      - name: Confirm local and remote migration histories align
        shell: bash
        env:
          BASELINE_VERSION: ${{ steps.migration.outputs.version }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          pnpm exec supabase --output-format json migration list --linked \
            | tee artifacts/migration-list-after.json
          node "$RUNNER_TEMP/check-migration-history.mjs" \
            artifacts/migration-list-after.json aligned "$BASELINE_VERSION" forja_remote_baseline

      - name: Require an empty production dry-run
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          pnpm exec supabase db push --linked --dry-run 2>&1 \
            | tee artifacts/db-push-dry-run.txt
          grep -Eiq '(Remote database is up to date|No migrations to push|already up to date)' \
            artifacts/db-push-dry-run.txt || {
            echo "Dry-run did not confirm an up-to-date remote database."
            exit 1
          }

      - name: Verify remote credentials are absent from local validation
        shell: bash
        run: |
          set -euo pipefail
          test -z "${SUPABASE_ACCESS_TOKEN:-}"
          test -z "${SUPABASE_DB_PASSWORD:-}"

      - name: Start the minimal local Supabase stack
        run: >-
          pnpm exec supabase start
          -x studio,imgproxy,functions,edge-runtime,analytics,vector

      - name: Inspect local migration history
        run: pnpm exec supabase migration list --local

      - name: Lint the reconstructed local database
        run: pnpm exec supabase db lint --local --fail-on error

      - name: Run local security advisors
        run: pnpm exec supabase db advisors --local --type security --fail-on error

      - name: Run local performance advisors
        run: pnpm exec supabase db advisors --local --type performance --fail-on error
      - name: Generate public database types from the validated local database
        shell: bash
        run: |
          set -euo pipefail

          env -u SUPABASE_ACCESS_TOKEN -u SUPABASE_DB_PASSWORD \
            pnpm exec supabase gen types --local --lang typescript --schema public \
            > supabase/database.types.ts

          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";

          const file = "supabase/database.types.ts";
          const source = readFileSync(file, "utf8").replace(/\r\n/g, "\n");

          const normalized =
            source
              .split("\n")
              .map((line) => line.replace(/[ \t]+$/u, ""))
              .join("\n")
              .replace(/\n+$/u, "") + "\n";

          writeFileSync(file, normalized, "utf8");
          NODE

          test -s supabase/database.types.ts
          grep -Fq 'export type Database' supabase/database.types.ts

          if grep -Eiq 'sb_secret_[A-Za-z0-9_-]+|sbp_[A-Za-z0-9_-]+|gh[pousr]_[A-Za-z0-9_]+|SUPABASE_(ACCESS_TOKEN|DB_PASSWORD)|postgres(ql)?://[^[:space:]]+:[^@[:space:]]+@|eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}' supabase/database.types.ts; then
            echo "Secret scan failed for generated database types."
            exit 1
          fi
      - name: Stop and remove local Supabase containers
        if: always()
        shell: bash
        run: pnpm exec supabase stop --no-backup || true

      - name: Prepare the baseline-only change set
        shell: bash
        env:
          BASELINE_PATH: ${{ steps.migration.outputs.path }}
        run: |
          set -euo pipefail
          test -s supabase/database.types.ts || {
            echo "Generated database types are missing or empty."
            exit 1
          }
          reject_sensitive_content() {
            local pattern="$1"
            local category="$2"
            if grep -Eiq "$pattern" "$BASELINE_PATH" supabase/database.types.ts; then
              echo "Secret scan failed: $category detected."
              exit 1
            fi
          }

          reject_sensitive_content 'sb_secret_[A-Za-z0-9_-]+' 'Supabase secret key'
          reject_sensitive_content 'sbp_[A-Za-z0-9_-]+' 'Supabase personal token'
          reject_sensitive_content 'gh[pousr]_[A-Za-z0-9_]+' 'GitHub personal token'
          reject_sensitive_content 'SUPABASE_(ACCESS_TOKEN|DB_PASSWORD)' 'Supabase credential environment variable'
          reject_sensitive_content 'postgres(ql)?://[^[:space:]]+:[^@[:space:]]+@' 'database connection string with password'
          reject_sensitive_content 'eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}' 'JWT'

          rm -rf artifacts
          rm .github/workflows/supabase-baseline.yml

          while IFS= read -r status_line; do
            path="${status_line:3}"
            case "$path" in
              "$BASELINE_PATH"|supabase/database.types.ts|.github/workflows/supabase-baseline.yml)
                ;;
              *)
                echo "Unexpected worktree change: $path"
                exit 1
                ;;
            esac
          done < <(git status --porcelain=v1 --untracked-files=all)

      - name: Commit and push the baseline branch
        shell: bash
        env:
          BASELINE_PATH: ${{ steps.migration.outputs.path }}
          BASELINE_BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          set -euo pipefail
          git add -- "$BASELINE_PATH" supabase/database.types.ts
          git rm -- .github/workflows/supabase-baseline.yml
          git diff --cached --check

          mapfile -t staged < <(git diff --cached --name-only | sort)
          expected=(
            ".github/workflows/supabase-baseline.yml"
            "$BASELINE_PATH"
            "supabase/database.types.ts"
          )
          mapfile -t expected_sorted < <(printf '%s\n' "${expected[@]}" | sort)
          test "${staged[*]}" = "${expected_sorted[*]}" || {
            echo "Staged files do not match the expected baseline-only change set."
            printf 'Staged: %s\n' "${staged[@]}"
            exit 1
          }

          git commit -m "chore(supabase): recover remote schema baseline"
          git push --set-upstream origin "$BASELINE_BRANCH"

      - name: Open the baseline pull request as draft
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BASELINE_BRANCH: ${{ steps.branch.outputs.name }}
          BASELINE_NAME: ${{ steps.migration.outputs.name }}
          BASELINE_VERSION: ${{ steps.migration.outputs.version }}
        run: |
          set -euo pipefail
          pr_body="$RUNNER_TEMP/baseline-pr.md"
          cat > "$pr_body" <<EOF
          ## Baseline recuperado

          - Migration: \`$BASELINE_NAME\`
          - Timestamp: \`$BASELINE_VERSION\`
          - Schema capturado: \`public\`
          - Dados capturados: nenhum
          - Primeira execução: registrou o baseline antes de falhar
          - Falha anterior: falso positivo para o identificador SQL \`service_role\`
          - Histórico antes da recuperação: uma migration remota registrada
          - Histórico depois: local e remoto alinhados em \`$BASELINE_VERSION\`
          - Recuperação: \`migration fetch --linked\`
          - \`db pull\` adicional executado: não
          - \`migration repair\` executado: não
          - \`db push --linked --dry-run\`: banco remoto sem migration pendente
          - Reconstrução local, migration list, lint e advisors: aprovados
          - \`db push\` real executado: não
          - Dados incluídos: nenhum
          - Workflow temporário: removido por este próprio PR

          Execução de auditoria: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF

          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$BASELINE_BRANCH" \
            --draft \
            --title "chore: recover Supabase remote baseline" \
            --body-file "$pr_body"
