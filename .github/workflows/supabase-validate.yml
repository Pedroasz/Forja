name: Supabase validate

on:
  pull_request:
    paths:
      - "supabase/**"
      - "scripts/validate-supabase-migrations.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/supabase-validate.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Show pinned CLI version
        run: pnpm run supabase:version
      - name: Validate migration filenames and ordering
        run: pnpm run supabase:validate:migrations
      - name: Require Docker
        run: docker info
      - name: Start local Supabase and apply migrations
        run: pnpm exec supabase start -x studio,imgproxy,functions,edge-runtime,analytics,vector
      - name: Inspect local migration history
        run: pnpm exec supabase migration list --local
      - name: Lint local database
        run: pnpm exec supabase db lint --local --fail-on error
      - name: Run local database advisors
        run: pnpm exec supabase db advisors --local --type all --fail-on error
      - name: Generate and validate local public database types
        shell: bash
        env:
          SUPABASE_DB_PASSWORD: senha-remota-falsa
        run: |
          set -euo pipefail
          temp_types="$(mktemp)"
          trap 'rm -f "$temp_types"' EXIT
          env -u SUPABASE_ACCESS_TOKEN -u SUPABASE_DB_PASSWORD \
            pnpm exec supabase gen types --local --lang typescript --schema public \
            > "$temp_types"
          test -s "$temp_types"
          grep -Fq 'export type Database' "$temp_types"
          if grep -Eiq 'sb_secret_[A-Za-z0-9_-]+|sbp_[A-Za-z0-9_-]+|gh[pousr]_[A-Za-z0-9_]+|SUPABASE_(ACCESS_TOKEN|DB_PASSWORD)|postgres(ql)?://[^[:space:]]+:[^@[:space:]]+@|eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}' "$temp_types"; then
            echo "Secret scan failed for generated database types."
            exit 1
          fi
      - name: Stop local Supabase
        if: always()
        run: pnpm exec supabase stop --no-backup
